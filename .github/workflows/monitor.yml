name: Crypto Signal Monitor

# v3.2.7 complete-week cache refresh
on:
  workflow_dispatch:
    inputs:
      send_discord:
        description: "Bericht an Discord senden"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: crypto-signal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository laden
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Lokalen Tag bestimmen
        id: context-key
        shell: bash
        run: echo "day=$(TZ=Europe/Berlin date +%F)" >> "$GITHUB_OUTPUT"

      - name: Neuesten Tageskontext laden
        id: daily-cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/seasonality
          key: seasonality-v327-complete-weeks-r2-${{ steps.context-key.outputs.day }}
          restore-keys: |
            seasonality-v327-complete-weeks-r2-
            seasonality-v327-adaptive-
            seasonality-v327-

      - name: Vorhandenen Cache erkennen
        id: cache-state
        shell: bash
        run: |
          if [ -s .cache/seasonality/state.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Frische Analyse mit vorhandenem Cache
        if: steps.cache-state.outputs.present == 'true'
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_DISCORD: ${{ inputs.send_discord }}
          LCW_RATE_STATE_PATH: .cache/lcw-rate.json
        run: python main.py --monitor-only

      - name: Complete-Week-Tageskontext aktualisieren
        if: steps.daily-cache.outputs.cache-hit != 'true' || steps.cache-state.outputs.present != 'true'
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          SEND_DISCORD: "false"
          LCW_RATE_STATE_PATH: .cache/lcw-rate.json
        run: python main.py --daily-only --no-send

      - name: Neuen Tageskontext speichern
        if: steps.daily-cache.outputs.cache-hit != 'true' || steps.cache-state.outputs.present != 'true'
        uses: actions/cache/save@v5
        with:
          path: .cache/seasonality
          key: seasonality-v327-complete-weeks-r2-${{ steps.context-key.outputs.day }}

      - name: Erste Analyse nach initialem Cache-Aufbau
        if: steps.cache-state.outputs.present != 'true'
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_DISCORD: ${{ inputs.send_discord }}
          LCW_RATE_STATE_PATH: .cache/lcw-rate.json
        run: python main.py --monitor-only
