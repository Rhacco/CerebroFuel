name: Crypto Signal Monitor

on:
  workflow_dispatch:
    inputs:
      send_discord:
        description: "Bericht an Discord senden"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: crypto-signal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: LCW-Historie aus Cache laden
        uses: actions/cache/restore@v4
        with:
          path: state/history_cache.json
          key: lcw-history-v2-${{ github.run_id }}
          restore-keys: |
            lcw-history-v2-

      - name: Analyse ausführen
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_DISCORD: ${{ inputs.send_discord }}
        run: python main.py

      - name: Aktualisierte LCW-Historie speichern
        if: ${{ always() && hashFiles('output/history_refreshed.flag') != '' }}
        uses: actions/cache/save@v4
        with:
          path: state/history_cache.json
          key: lcw-history-v2-${{ github.run_id }}
