name: Crypto Signal Monitor

# v3.2.6: immutable retryable daily context + complete short-data Top 8

on:
  workflow_dispatch:
    inputs:
      send_discord:
        description: "Bericht an Discord senden"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: crypto-signal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Lokalen Cache-Tag bestimmen
        id: context-key
        shell: bash
        run: |
          echo "day=$(TZ=Europe/Berlin date +%F)" >> "$GITHUB_OUTPUT"

      - name: Letzten Tageskontext wiederherstellen
        id: context-cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/seasonality
          key: seasonality-v326q3-${{ runner.os }}-${{ steps.context-key.outputs.day }}-${{ hashFiles('config.json', 'analysis.py', 'daily_context.py', 'main.py') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            seasonality-v326q3-${{ runner.os }}-${{ steps.context-key.outputs.day }}-${{ hashFiles('config.json', 'analysis.py', 'daily_context.py', 'main.py') }}-
            seasonality-v326q3-${{ runner.os }}-

      - name: Abhängigkeiten installieren
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Frische Analyse ausführen
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_DISCORD: ${{ inputs.send_discord }}
        run: python main.py

      - name: Neuen Tageskontext erkennen
        id: context-save
        if: always()
        shell: bash
        run: |
          if [[ -f .cache/seasonality/save_required && -f .cache/seasonality/state.json ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verbesserten Tageskontext speichern
        if: always() && steps.context-save.outputs.required == 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/seasonality
          key: ${{ steps.context-cache.outputs.cache-primary-key }}
