name: Crypto Signal Monitor

on:
  schedule:
    # Zweimal pro Stunde, bewusst nicht zur vollen Stunde.
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      send_discord:
        description: "Bericht an Discord senden"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: crypto-signal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Analyse ausführen
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_DISCORD: ${{ github.event_name == 'schedule' || inputs.send_discord }}
        run: python main.py

      - name: Ergebnis zur Kontrolle speichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-report-${{ github.run_number }}
          path: output/
          if-no-files-found: warn
          retention-days: 7
