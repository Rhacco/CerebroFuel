name: Crypto Signal Monitor

# v3.2.7: daily long-history cache + fresh five-minute short analysis
on:
  workflow_dispatch:
    inputs:
      send_discord:
        description: "Bericht an Discord senden"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: crypto-signal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Lokalen Tag bestimmen
        id: context-key
        shell: bash
        run: echo "day=$(TZ=Europe/Berlin date +%F)" >> "$GITHUB_OUTPUT"

      - name: Tageskontext laden
        uses: actions/cache@v4
        with:
          path: .cache/seasonality
          key: seasonality-v327-${{ hashFiles('config.json', 'analysis.py', 'daily_context.py') }}-${{ steps.context-key.outputs.day }}
          restore-keys: |
            seasonality-v327-${{ hashFiles('config.json', 'analysis.py', 'daily_context.py') }}-

      - name: Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Frische Analyse ausführen
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_DISCORD: ${{ inputs.send_discord }}
        run: python main.py
