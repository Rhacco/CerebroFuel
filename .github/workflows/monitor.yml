name: Crypto Signal Monitor

# v3.3.1: ranked 5x/10x + strict 3x expansion with bounded 10/30/60 detail confirmation.
on:
  workflow_dispatch:
    inputs:
      send_discord:
        description: "Bericht an Discord senden"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: crypto-signal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repository laden
        uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Lokalen Tag bestimmen
        id: context-key
        shell: bash
        run: echo "day=$(TZ=Europe/Berlin date +%F)" >> "$GITHUB_OUTPUT"

      - name: Neuesten Roh- und Tageskontext laden
        id: daily-cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/seasonality
          key: seasonality-v331-${{ steps.context-key.outputs.day }}-${{ github.run_id }}
          restore-keys: |
            seasonality-v331-${{ steps.context-key.outputs.day }}-
            seasonality-v331-
            seasonality-v330-${{ steps.context-key.outputs.day }}-
            seasonality-v330-
            seasonality-v327-complete-weeks-r2-${{ steps.context-key.outputs.day }}
            seasonality-v327-complete-weeks-r2-
            seasonality-v327-adaptive-

      - name: Letzte Vollpool-Snapshots laden
        uses: actions/cache/restore@v5
        with:
          path: .cache/flash
          key: flash-v331-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            flash-v331-
            flash-v330-
            flash-v329-

      - name: Abhängigkeiten installieren
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Kompatiblen Tageskontext vorbereiten
        id: prepare-daily
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          SEND_DISCORD: "false"
          LCW_RATE_STATE_PATH: .cache/lcw-rate.json
        run: python main.py --daily-only --no-send

      - name: Aktualisierten Tageskontext speichern
        if: steps.prepare-daily.outputs.changed == 'true'
        uses: actions/cache/save@v5
        with:
          path: .cache/seasonality
          key: seasonality-v331-${{ steps.context-key.outputs.day }}-${{ github.run_id }}

      - name: Frische Analyse ausführen
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_DISCORD: ${{ inputs.send_discord }}
          LCW_RATE_STATE_PATH: .cache/lcw-rate.json
        run: python main.py --monitor-only

      - name: Aktualisierte Vollpool-Snapshots speichern
        if: always() && hashFiles('.cache/flash/state.json') != ''
        uses: actions/cache/save@v5
        with:
          path: .cache/flash
          key: flash-v331-${{ github.run_id }}-${{ github.run_attempt }}
