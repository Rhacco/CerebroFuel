name: Crypto Signal Monitor

# v3.2.6: external workflow_dispatch start; daily long-context cache in GitHub Actions

on:
  workflow_dispatch:
    inputs:
      send_discord:
        description: "Bericht an Discord senden"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: crypto-signal-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Lokalen Cache-Tag bestimmen
        id: context-key
        shell: bash
        run: |
          echo "day=$(TZ=Europe/Berlin date +%F)" >> "$GITHUB_OUTPUT"

      - name: Täglichen Markt-Kontext wiederherstellen
        id: context-cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/seasonality
          key: seasonality-v326-${{ runner.os }}-${{ steps.context-key.outputs.day }}-${{ hashFiles('config.json', 'analysis.py', 'daily_context.py') }}
          restore-keys: |
            seasonality-v326-${{ runner.os }}-

      - name: Abhängigkeiten installieren
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Frische Analyse ausführen
        env:
          LCW_API_KEY: ${{ secrets.LCW_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEND_DISCORD: ${{ inputs.send_discord }}
        run: python main.py

      - name: Tageskontext prüfen
        id: context-ready
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          path = Path('.cache/seasonality/state.json')
          ready = False
          try:
              state = json.loads(path.read_text(encoding='utf-8'))
              today = datetime.now(ZoneInfo('Europe/Berlin')).date().isoformat()
              ready = state.get('version') == '3.2.6' and state.get('date') == today
          except Exception:
              pass
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f"ready={'true' if ready else 'false'}\n")
          PY

      - name: Neuen Tageskontext speichern
        if: always() && steps.context-ready.outputs.ready == 'true' && steps.context-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/seasonality
          key: ${{ steps.context-cache.outputs.cache-primary-key }}
